repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      - id: ruff
        args: [--fix]
  - repo: local
    hooks:
      - id: check-file-lines
        name: cap file size at 500 lines
        entry: python scripts/check_lines.py
        language: system
        pass_filenames: false
